# PXXL deployment config - frontend-only
# This file instructs PXXL to build the frontend folder and publish `dist`.
# If your PXXL dashboard uses a different filename or schema, adapt accordingly.

project: plutoboost-backend
docker:
  # Build the backend image using the Dockerfile in `backend/`
  dockerfile: Dockerfile
  context: backend
  expose: 5000

env:
  DISABLE_STATIC_FRONTEND: "true"
  FRONTEND_URL: "https://plutoboost.netlify.app"
  FRONTEND_URLS: "https://plutoboost.netlify.app,http://localhost:5173"
