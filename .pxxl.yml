# PXXL deployment config - frontend-only Docker runtime
# Use a hidden file to ensure PXXL reads the config.

project: plutoboost-backend
docker:
  # Build the backend image using the Dockerfile inside the `backend/` folder
  dockerfile: Dockerfile
  context: backend
  expose: 5000

env:
  DISABLE_STATIC_FRONTEND: "true"
  # FRONTEND_URL should point to your Netlify site
  FRONTEND_URL: "https://plutoboost.netlify.app"
